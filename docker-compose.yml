version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: assesspro-db
    restart: always
    environment:
      POSTGRES_DB: assesspro
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: assesspropassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d assesspro"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: assesspro-cache
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: assesspro-api
    restart: always
    ports:
      - "5001:5001"
    environment:
      - DATABASE_URL=postgresql://postgres:assesspropassword@postgres:5432/assesspro?schema=public
      - REDIS_URL=redis://redis:6379
      - PORT=5001
      - JWT_SECRET=assesspro_jwt_secret_key_2026_super_secure
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: assesspro-web
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
