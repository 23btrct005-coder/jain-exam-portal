name: AssessPro AI CI/CD Pipeline

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/frontend

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        workspace: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci --workspace=${{ matrix.workspace }}
      - run: npm run build --workspace=${{ matrix.workspace }}

  build-images:
    name: Build Docker Images
    needs: lint-and-typecheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - context: .
            dockerfile: backend/Dockerfile
            image_name: backend
          - context: .
            dockerfile: frontend/Dockerfile
            image_name: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image_name }}:latest
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image_name }}:${{ github.sha }}

  deploy-staging:
    name: Deploy to Staging
    needs: build-images
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Kubernetes Staging
        run: |
          echo "Deploying to staging cluster..."
          # kubectl apply -f devops/k8s-deployment.yaml --namespace assesspro-staging

  deploy-production:
    name: Deploy to Production
    needs: build-images
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Kubernetes Production
        run: |
          echo "Deploying to production cluster..."
          # kubectl apply -f devops/k8s-deployment.yaml --namespace assesspro
